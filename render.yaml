services:
  - type: web
    name: admission-dashboard-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SSL
        value: true
      - key: ENABLE_NOTIFICATION_INTERVAL
        value: true
